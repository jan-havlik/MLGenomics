services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PARQUET_DIR=/data/data
      - JOBS_DIR=/data/data/jobs
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - ./data:/data/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PARQUET_DIR=/data/data
      - JOBS_DIR=/data/data/jobs
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  redis_data:
