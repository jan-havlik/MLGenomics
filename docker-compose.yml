services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro
      - jobs_data:/var/data/jobs
      - library_data:/var/data/library
      - cache_data:/var/data/cache
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PARQUET_DIR=/app/data
      - JOBS_DIR=/var/data/jobs
      - LIBRARY_DIR=/var/data/library
      - FEATURE_CACHE_DIR=/var/data/cache
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A celery_app.celery worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro
      - jobs_data:/var/data/jobs
      - library_data:/var/data/library
      - cache_data:/var/data/cache
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PARQUET_DIR=/app/data
      - JOBS_DIR=/var/data/jobs
      - LIBRARY_DIR=/var/data/library
      - FEATURE_CACHE_DIR=/var/data/cache
    depends_on:
      redis:
        condition: service_healthy

  # Frontend dev server — hot reload for local development only.
  # In production the React build is served directly by the API (see main.py).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    profiles:
      - dev
    depends_on:
      - api

volumes:
  redis_data:
  jobs_data:
  library_data:
  cache_data:
